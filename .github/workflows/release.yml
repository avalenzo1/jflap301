name: Build and Release JFLAP

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from GitHub release
        run: |
          # Extract version from GitHub reference (e.g., refs/tags/v7.2 → 7.2)
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}  # Remove 'v' prefix if present
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using release version: $VERSION"

      - name: Build with Maven
        run: mvn clean package source:jar -Dproject.version=${{ env.RELEASE_VERSION }}

      - name: Build without source
        run: mvn package -P without-source -Dproject.version=${{ env.RELEASE_VERSION }}

      - name: Upload Regular JAR
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./target/jflap-${{ env.RELEASE_VERSION }}.jar
          asset_name: jflap-${{ env.RELEASE_VERSION }}.jar
          asset_content_type: application/java-archive

      - name: Upload All-in-One JAR
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./target/JFLAP.jar
          asset_name: JFLAP-${{ env.RELEASE_VERSION }}-with-dependencies.jar
          asset_content_type: application/java-archive

      - name: Upload Sources JAR
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./target/JFLAP_With_Source.jar
          asset_name: JFLAP-${{ env.RELEASE_VERSION }}-sources.jar
          asset_content_type: application/java-archive
